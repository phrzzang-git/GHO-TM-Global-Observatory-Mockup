<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDS Analytics - Advanced Interactive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f6f3; --surface: #ffffff; --border: #d8d5d0; --ink: #1c1b18; 
            --ink-dim: #8a8880; --c-blue: #4a7c8e; --c-purple: #7a5c8a; --c-green: #6b8f5e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; overflow-x: hidden; }
        .masthead { background: var(--surface); border-bottom: 1px solid var(--border); padding: 25px 48px; }
        .body-wrap { max-width: 1400px; margin: 0 auto; padding: 20px 40px; }
        .section-head { border-bottom: 1px solid var(--border); margin: 30px 0 15px; padding-bottom: 8px; }
        .grid { display: grid; gap: 20px; margin-bottom: 20px; }
        .g1 { grid-template-columns: 1fr; }
        .g2 { grid-template-columns: 1fr 1fr; }
        .g4 { grid-template-columns: repeat(4, 1fr); }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 4px; position: relative; }
        .chart-container { position: relative; height: 280px; width: 100%; }
        .card-title { font-weight: 600; margin-bottom: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-dim); }
        #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono'; }
        .filter-info { font-family: 'IBM Plex Mono'; font-size: 11px; background: #eee; padding: 4px 8px; border-radius: 3px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loading">Processing 100,000+ Records...</div>

<div class="masthead">
    <h1>TM Global Observatory <span style="font-weight: 300; font-size: 18px;">MDS Analytics v3.0</span></h1>
</div>

<div class="body-wrap">
    <div class="grid g2">
        <div class="card">
            <div class="card-title">Gender Parity by Age (Click Average Dots to Filter)</div>
            <div class="chart-container"><canvas id="gpiAgeChart"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title">Annual Patient Trends</div>
            <div class="chart-container"><canvas id="annualTrendChart"></canvas></div>
        </div>
    </div>

    <div class="section-head">
        <h2>Interactive Deep Dive: <span id="current-filter-label">All Data</span></h2>
    </div>

    <div class="grid g4">
        <div class="card">
            <div class="card-title">Modality Distribution</div>
            <div class="chart-container"><canvas id="subRadarChart"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title">ICD-11 Top 10 (Click Bar to Filter)</div>
            <div class="chart-container"><canvas id="subIcdChart"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title">TM Disorder Top 10</div>
            <div class="chart-container"><canvas id="subDisorderChart"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title">TM Pattern Top 10</div>
            <div class="chart-container"><canvas id="subPatternChart"></canvas></div>
        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyy2nuayzX3glsCOQdsOc4hKZukHzotf3e33ASi5Tqr1j5JvkMhxnYVtqdx21mTTJJgSA/exec";
let rawData = [];
let charts = {};
const ageGroups = ['0-14', '15-29', '30-44', '45-59', '60-74', '75+'];

document.addEventListener('DOMContentLoaded', init);

async function init() {
    try {
        const res = await fetch(API_URL);
        rawData = await res.json();
        document.getElementById('loading').style.display = 'none';
        
        renderGpiAgeChart(rawData);
        renderAnnualChart(rawData);
        updateDeepDive(rawData, "Global Population");
    } catch (e) {
        console.error(e);
    }
}

// 1. 연령대별 GPI 차트 (평균선 포함 & 인터랙티브)
function renderGpiAgeChart(data) {
    const countries = [...new Set(data.map(d => d.Country))].filter(c => c).sort();
    
    const getGpi = (filtered) => {
        const f = filtered.filter(d => d.Gender === 'Female').length;
        const m = filtered.filter(d => d.Gender === 'Male').length;
        return m === 0 ? 1 : parseFloat((f / m).toFixed(2));
    };

    const getAgeGroup = (dob) => {
        const age = 2026 - new Date(dob).getFullYear();
        if (age <= 14) return '0-14'; if (age <= 29) return '15-29';
        if (age <= 44) return '30-44'; if (age <= 59) return '45-59';
        if (age <= 74) return '60-74'; return '75+';
    };

    const datasets = countries.map((c, i) => ({
        type: 'bar',
        label: c,
        backgroundColor: ['#4a7c8e', '#7a5c8a', '#6b8f5e', '#c47a3a', '#5a7ab8'][i%5] + '88',
        data: ageGroups.map(g => getGpi(data.filter(d => d.Country === c && getAgeGroup(d.Date_of_birth) === g)))
    }));

    // 평균선 추가
    const averages = ageGroups.map(g => getGpi(data.filter(d => getAgeGroup(d.Date_of_birth) === g)));
    datasets.push({
        type: 'line',
        label: 'Global Average',
        data: averages,
        borderColor: '#1c1b18',
        borderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 8,
        fill: false,
        order: -1
    });

    const ctx = document.getElementById('gpiAgeChart').getContext('2d');
    charts.gpi = new Chart(ctx, {
        data: { labels: ageGroups, datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            onClick: (e, elements) => {
                if (elements.length > 0) {
                    const idx = elements[0].index;
                    const selectedAge = ageGroups[idx];
                    const filtered = data.filter(d => getAgeGroup(d.Date_of_birth) === selectedAge);
                    updateDeepDive(filtered, `Age Group: ${selectedAge}`);
                }
            }
        }
    });
}

// 2. 하위 4개 차트 일괄 업데이트
function updateDeepDive(filteredData, label) {
    document.getElementById('current-filter-label').innerText = label;
    
    renderRadar(filteredData);
    renderSubBar(filteredData, 'ICD11_Code', 'subIcdChart', '#4a7c8e', true); // ICD 차트는 클릭 가능
    renderSubBar(filteredData, 'TM_Disorder', 'subDisorderChart', '#7a5c8a', false);
    renderSubBar(filteredData, 'TM_Pattern', 'subPatternChart', '#6b8f5e', false);
}

// 3. 공통 바 차트 (ICD 클릭 시 Disorder/Pattern 연동)
function renderSubBar(fData, field, canvasId, color, isInteractive) {
    const counts = {};
    fData.forEach(d => { if(d[field]) counts[d[field]] = (counts[d[field]] || 0) + 1; });
    const top10 = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 10);

    const ctx = document.getElementById(canvasId).getContext('2d');
    if (charts[canvasId]) charts[canvasId].destroy();

    charts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: top10.map(x => x[0]),
            datasets: [{ data: top10.map(x => x[1]), backgroundColor: color }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: false },
            onClick: (e, elements) => {
                if (isInteractive && elements.length > 0) {
                    const selectedIdx = elements[0].index;
                    const selectedCode = top10[selectedIdx][0];
                    
                    // ICD-11 코드로 한 번 더 필터링하여 Disorder와 Pattern 업데이트
                    const deeperData = fData.filter(d => d.ICD11_Code === selectedCode);
                    renderSubBar(deeperData, 'TM_Disorder', 'subDisorderChart', '#7a5c8a', false);
                    renderSubBar(deeperData, 'TM_Pattern', 'subPatternChart', '#6b8f5e', false);
                    document.getElementById('current-filter-label').innerText += ` > ${selectedCode}`;
                }
            }
        }
    });
}

// 4. Modality 방사형 차트
function renderRadar(fData) {
    const counts = {};
    fData.forEach(d => { if(d.Modality) counts[d.Modality] = (counts[d.Modality] || 0) + 1; });
    
    const ctx = document.getElementById('subRadarChart').getContext('2d');
    if (charts.radar) charts.radar.destroy();
    charts.radar = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: Object.keys(counts),
            datasets: [{ data: Object.values(counts), backgroundColor: 'rgba(74, 124, 142, 0.2)', borderColor: '#4a7c8e' }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false } }
    });
}

// 5. 연도별 트렌드 (참고용)
function renderAnnualChart(data) {
    const years = [2022, 2023, 2024, 2025, 2026];
    const ctx = document.getElementById('annualTrendChart').getContext('2d');
    const counts = years.map(y => new Set(data.filter(d => new Date(d.Visit_Date).getFullYear() === y).map(d => d.Patient_ID)).size);
    
    new Chart(ctx, {
        type: 'line',
        data: { labels: years, datasets: [{ label: 'Unique Patients', data: counts, borderColor: '#c47a3a', tension: 0.3, fill: true, backgroundColor: '#c47a3a22' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
}
</script>
</body>
</html>
